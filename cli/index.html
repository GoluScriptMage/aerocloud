<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aerocloud Deployments Sandbox</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161821;
            --accent-cyan: #00f3ff;
            --accent-green: #39ff14;
            --text-primary: #f0f3f5;
            --text-secondary: #8c96a3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .cyber-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .container {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            padding: 40px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            z-index: 2;
            text-align: center;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent-green);
            margin-right: 8px;
        }

        h1 {
            color: var(--accent-cyan);
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
        }

        p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .metadata {
            margin-top: 30px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            padding-top: 20px;
            text-align: left;
        }

        .metadata-item {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .metadata-item span {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="container">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <span class="status-dot"></span>
            <span style="font-weight: bold; color: var(--accent-green); text-transform: uppercase;">Node Active</span>
        </div>
        <h1>aerocloud</h1>
        <p>Your static website has been successfully bundled, uploaded, extracted, and served dynamically via the proxy router engine.</p>
        
        <div class="metadata">
            <div class="metadata-item">SYSTEM: <span>aerocloud PaaS v1.0 (MVP)</span></div>
            <div class="metadata-item">DEPLOY_STATUS: <span>COMPLETED</span></div>
            <div class="metadata-item">HOST_PROXY: <span>localhost:8080</span></div>
            <div class="metadata-item">ENGINEER: <span>GoluScriptMage</span></div>
        </div>
    </div>
</body>
</html>
